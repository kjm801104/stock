<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미국주식 분석기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
  :root{
    --bg:#0a0e14;--panel:#11161f;--panel2:#161c27;--line:#1f2733;
    --txt:#e8edf4;--dim:#7a8696;--green:#1ed760;--red:#ff4d5e;
    --gold:#ffcb45;--blue:#4da6ff;--accent:#00e0c6;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:radial-gradient(1200px 600px at 80% -10%,rgba(0,224,198,.08),transparent),
    radial-gradient(900px 500px at -10% 110%,rgba(77,166,255,.07),transparent),var(--bg);
    color:var(--txt);font-family:'Outfit',sans-serif;min-height:100vh;padding:20px 16px 60px;}
  .wrap{max-width:520px;margin:0 auto;}
  .ver{font-size:10px;color:#2a3442;text-align:center;margin-bottom:6px;}
  .head{text-align:center;margin-bottom:24px;}
  .head h1{font-size:26px;font-weight:800;letter-spacing:-.5px;
    background:linear-gradient(90deg,var(--accent),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .head p{color:var(--dim);font-size:12px;margin-top:4px;letter-spacing:1px;text-transform:uppercase;}
  .search{display:flex;gap:10px;margin-bottom:8px;}
  .search-wrap{position:relative;flex:1;}
  .search-wrap input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    color:var(--txt);padding:16px 18px;font-size:17px;font-weight:600;}
  .search-wrap input::placeholder{color:var(--dim);font-weight:400;}
  .search button{background:linear-gradient(135deg,var(--accent),var(--blue));
    border:none;border-radius:14px;color:#04121a;font-weight:800;font-size:16px;padding:0 26px;cursor:pointer;}
  .search button:disabled{opacity:.4;cursor:wait;}
  #suggest{position:absolute;top:calc(100% + 6px);left:0;right:0;
    background:var(--panel);border:1px solid var(--accent);border-radius:14px;z-index:100;overflow:hidden;display:none;max-height:320px;overflow-y:auto;}
  .sug-item{display:flex;justify-content:space-between;align-items:center;
    padding:12px 16px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--line);}
  .sug-item:last-child{border-bottom:none;}
  .sug-item:active{background:var(--panel2);}
  .sug-ticker{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);}
  .hint{font-size:11px;color:var(--dim);text-align:center;margin-bottom:16px;}
  .quick-title{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;text-align:center;}
  .quick{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px;justify-content:center;}
  .quick span{background:var(--panel);border:1px solid var(--line);border-radius:20px;
    padding:7px 13px;font-size:12px;color:var(--dim);cursor:pointer;display:flex;gap:5px;align-items:center;}
  .quick span:active{border-color:var(--accent);color:var(--accent);}
  .quick span .tk{font-family:'JetBrains Mono',monospace;font-weight:700;}
  .quick span .kr{font-size:11px;opacity:.7;}
  .msg{text-align:center;color:var(--dim);padding:40px 0;font-size:14px;line-height:2;}
  .msg.err{color:var(--red);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    margin-bottom:14px;overflow:hidden;animation:rise .4s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  .price-card{padding:22px 20px;}
  .ticker-name{font-size:13px;color:var(--dim);margin-bottom:2px;}
  .ticker-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;}
  .ticker{font-size:20px;font-weight:800;}
  .live{font-size:10px;color:var(--green);display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(30,215,96,.5);}50%{opacity:.6;box-shadow:0 0 0 6px rgba(30,215,96,0);}}
  .price{font-size:40px;font-weight:800;font-family:'JetBrains Mono',monospace;letter-spacing:-1px;}
  .change{font-size:15px;font-weight:600;margin-top:2px;}
  .up{color:var(--green);}.down{color:var(--red);}
  .score-card{padding:20px;text-align:center;}
  .score-label{font-size:12px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .score-bar{height:10px;border-radius:5px;background:var(--line);margin:8px 0;overflow:hidden;}
  .score-fill{height:100%;border-radius:5px;transition:width .6s ease;}
  .score-num{font-size:32px;font-weight:800;font-family:'JetBrains Mono',monospace;}
  .score-desc{font-size:13px;margin-top:6px;}
  .ind-grid{padding:18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .ind{background:var(--panel2);border-radius:12px;padding:12px 14px;}
  .ind .lbl{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
  .ind .val{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .ind .sub{font-size:11px;color:var(--dim);margin-top:2px;}
  .lvl-card{padding:18px 20px;display:flex;gap:12px;}
  .lvl{flex:1;text-align:center;background:var(--panel2);border-radius:12px;padding:12px;}
  .lvl .lbl{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
  .lvl .val{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .lvl.sup .val{color:var(--blue);}.lvl.res .val{color:var(--gold);}
  .outlook{border-radius:14px;margin-bottom:14px;padding:18px 20px;animation:rise .4s ease both;}
  .outlook.bull{background:rgba(30,215,96,.08);border:1px solid rgba(30,215,96,.3);}
  .outlook.bear{background:rgba(255,77,94,.08);border:1px solid rgba(255,77,94,.3);}
  .outlook.neutral{background:rgba(255,203,69,.08);border:1px solid rgba(255,203,69,.3);}
  .outlook-title{font-size:18px;font-weight:800;margin-bottom:8px;}
  .outlook.bull .outlook-title{color:var(--green);}
  .outlook.bear .outlook-title{color:var(--red);}
  .outlook.neutral .outlook-title{color:var(--gold);}
  .outlook-desc{font-size:13px;line-height:1.7;}
  .plan-card{padding:0;}
  .plan-tab{display:flex;align-items:center;gap:8px;padding:14px 20px;font-size:13px;font-weight:800;border-bottom:1px solid var(--line);}
  .plan-tab.day{color:var(--gold);}.plan-tab.swing{color:var(--accent);}
  .plan-body{padding:16px 20px;}
  .prow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);}
  .prow:last-child{border-bottom:none;}
  .prow .k{font-size:13px;color:var(--dim);}
  .prow .v{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .pct{font-size:12px;font-weight:600;margin-left:7px;}
  .news-card{padding:18px 20px;}
  .news-title{font-size:12px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
  .news-item{padding:10px 0;border-bottom:1px dashed var(--line);}
  .news-item:last-child{border-bottom:none;}
  .news-item .nt{font-size:13px;line-height:1.5;color:var(--txt);}
  .news-item .ns{font-size:11px;color:var(--dim);margin-top:4px;}
  .disc{text-align:center;font-size:10px;color:#3a4452;margin-top:18px;line-height:1.5;}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#04121a;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .progress{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;text-align:center;margin-bottom:14px;}
  .progress-bar{height:6px;background:var(--line);border-radius:3px;margin:12px 0;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:3px;transition:width .3s ease;}
  .progress-text{font-size:12px;color:var(--dim);}
</style>
</head>
<body>
<div class="wrap">
  <div class="ver">US v9.0 · 50종목 · 키 4개</div>
  <div class="head">
    <h1>🇺🇸 미국주식 분석기</h1>
    <p>RSI · MACD · 볼린저 · 뉴스 · 전망</p>
  </div>

  <div class="search">
    <div class="search-wrap">
      <input id="ticker" placeholder="엔비디아 / NVDA" autocomplete="off">
      <div id="suggest"></div>
    </div>
    <button id="go">분석</button>
  </div>
  <div class="hint">한글·영문 모두 입력 가능 🔍</div>

  <div class="quick-title">▼ 대표주 50선 (탭하면 바로 분석)</div>
  <div class="quick" id="quick"></div>

  <div id="out"><div class="msg">종목을 탭하거나 검색하세요 📈</div></div>

  <div class="disc">
    Alpha Vantage · 키 4개 로테이션 (하루 약 20회 분석)<br>
    투자 판단과 책임은 본인에게 있습니다.
  </div>
</div>

<script>
const $=id=>document.getElementById(id);

// === API 키 4개 로테이션 ===
const KEYS=['KJKC0HC0KUFHJHOI','2BJMBWH58QRW68I3','WNZX1QPFXBO357HX','V2DL1NPCWCGOPIOS'];
let keyIdx=0;
function nextKey(){ const k=KEYS[keyIdx]; keyIdx=(keyIdx+1)%KEYS.length; return k; }

let sym='';

// === 대표주 50선 ===
const STOCKS=[
  {k:'엔비디아',t:'NVDA',n:'NVIDIA'},{k:'애플',t:'AAPL',n:'Apple'},
  {k:'마이크로소프트',t:'MSFT',n:'Microsoft'},{k:'아마존',t:'AMZN',n:'Amazon'},
  {k:'알파벳',t:'GOOGL',n:'Alphabet'},{k:'구글',t:'GOOGL',n:'Alphabet'},
  {k:'메타',t:'META',n:'Meta'},{k:'테슬라',t:'TSLA',n:'Tesla'},
  {k:'브로드컴',t:'AVGO',n:'Broadcom'},{k:'TSMC',t:'TSM',n:'TSMC'},
  {k:'일라이릴리',t:'LLY',n:'Eli Lilly'},{k:'월마트',t:'WMT',n:'Walmart'},
  {k:'JP모건',t:'JPM',n:'JPMorgan'},{k:'비자',t:'V',n:'Visa'},
  {k:'마스터카드',t:'MA',n:'Mastercard'},{k:'유나이티드헬스',t:'UNH',n:'UnitedHealth'},
  {k:'엑슨모빌',t:'XOM',n:'Exxon Mobil'},{k:'오라클',t:'ORCL',n:'Oracle'},
  {k:'코스트코',t:'COST',n:'Costco'},{k:'존슨앤존슨',t:'JNJ',n:'J&J'},
  {k:'홈디포',t:'HD',n:'Home Depot'},{k:'P&G',t:'PG',n:'P&G'},
  {k:'넷플릭스',t:'NFLX',n:'Netflix'},{k:'뱅크오브아메리카',t:'BAC',n:'Bank of America'},
  {k:'애브비',t:'ABBV',n:'AbbVie'},{k:'코카콜라',t:'KO',n:'Coca-Cola'},
  {k:'세일즈포스',t:'CRM',n:'Salesforce'},{k:'쉐브론',t:'CVX',n:'Chevron'},
  {k:'AMD',t:'AMD',n:'AMD'},{k:'펩시',t:'PEP',n:'PepsiCo'},
  {k:'토요타',t:'TM',n:'Toyota'},{k:'맥도날드',t:'MCD',n:'McDonald'},
  {k:'어도비',t:'ADBE',n:'Adobe'},{k:'시스코',t:'CSCO',n:'Cisco'},
  {k:'퀄컴',t:'QCOM',n:'Qualcomm'},{k:'디즈니',t:'DIS',n:'Disney'},
  {k:'인텔',t:'INTC',n:'Intel'},{k:'IBM',t:'IBM',n:'IBM'},
  {k:'버라이즌',t:'VZ',n:'Verizon'},{k:'나이키',t:'NKE',n:'Nike'},
  {k:'스타벅스',t:'SBUX',n:'Starbucks'},{k:'팔란티어',t:'PLTR',n:'Palantir'},
  {k:'마이크론',t:'MU',n:'Micron'},{k:'코인베이스',t:'COIN',n:'Coinbase'},
  {k:'ARM',t:'ARM',n:'ARM'},{k:'우버',t:'UBER',n:'Uber'},
  {k:'보잉',t:'BA',n:'Boeing'},{k:'슈퍼마이크로',t:'SMCI',n:'Super Micro'},
  {k:'에어비앤비',t:'ABNB',n:'Airbnb'},{k:'스냅',t:'SNAP',n:'Snap'},
];

// 퀵버튼 렌더 (중복 티커 제거)
const seen=new Set();
const quickList=STOCKS.filter(s=>{ if(seen.has(s.t))return false; seen.add(s.t); return true; });
$('quick').innerHTML=quickList.map(s=>`<span data-t="${s.k}"><span class="tk">${s.t}</span><span class="kr">${s.k}</span></span>`).join('');

function resolve(input){
  const t=input.trim();
  if(/^[A-Za-z.]+$/.test(t)){const up=t.toUpperCase();return STOCKS.find(s=>s.t===up)||{t:up,n:up,k:up};}
  return STOCKS.find(s=>s.k===t)||STOCKS.find(s=>s.k.includes(t)||t.includes(s.k))||null;
}

function buildSuggest(val){
  const box=$('suggest');box.innerHTML='';box.style.display='none';
  if(!val) return;
  const m=/^[A-Za-z]/.test(val)
    ?STOCKS.filter(s=>s.t.startsWith(val.toUpperCase())||s.n.toLowerCase().startsWith(val.toLowerCase())).slice(0,8)
    :STOCKS.filter(s=>s.k.includes(val)).slice(0,8);
  if(!m.length) return;
  m.forEach(s=>{
    const d=document.createElement('div');d.className='sug-item';
    d.innerHTML=`<span>${s.k}</span><span class="sug-ticker">${s.t}</span>`;
    d.onclick=()=>{ $('ticker').value=s.k; box.style.display='none'; run(); };
    box.appendChild(d);
  });
  box.style.display='block';
}

$('quick').addEventListener('click',e=>{
  const sp=e.target.closest('span[data-t]');
  if(sp){ $('ticker').value=sp.dataset.t; run(); }
});
$('go').onclick=run;
$('ticker').addEventListener('input',e=>buildSuggest(e.target.value));
$('ticker').addEventListener('keydown',e=>{ if(e.key==='Enter'){ $('suggest').style.display='none'; run(); } });

function fmt(n,d=2){ return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
const delay=ms=>new Promise(r=>setTimeout(r,ms));

function setProgress(pct,text){
  $('out').innerHTML=`
    <div class="progress">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">📡 분석 중...</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${text}</div>
    </div>`;
}

// 키 한도초과시 다음 키로 자동 전환
async function avGet(fn,extra=''){
  for(let attempt=0;attempt<KEYS.length;attempt++){
    const key=KEYS[keyIdx];
    try{
      const r=await fetch(`https://www.alphavantage.co/query?function=${fn}&symbol=${sym}&apikey=${key}${extra}`);
      const d=await r.json();
      if(d.Note||d.Information){
        // 이 키 한도초과 → 다음 키로
        keyIdx=(keyIdx+1)%KEYS.length;
        await new Promise(r=>setTimeout(r,300));
        continue;
      }
      return d;
    }catch(e){ keyIdx=(keyIdx+1)%KEYS.length; }
  }
  throw new Error('모든 키 한도 초과 — 내일 다시 시도하세요');
}

function analyzeOutlook(rsi,macd,bollPct){
  let bull=0,bear=0;
  const signals=[];
  if(rsi!=null){
    if(rsi<30){bull+=3;signals.push('RSI 과매도('+fmt(rsi,0)+') 🟢');}
    else if(rsi<45){bull+=1;signals.push('RSI 약세권('+fmt(rsi,0)+') 🟡');}
    else if(rsi>70){bear+=3;signals.push('RSI 과매수('+fmt(rsi,0)+') 🔴');}
    else if(rsi>55){bull+=1;signals.push('RSI 강세권('+fmt(rsi,0)+') 🟢');}
    else signals.push('RSI 중립('+fmt(rsi,0)+') ⚪');
  }
  if(macd!=null){
    if(macd>0){bull+=2;signals.push('MACD 양전환 🟢');}
    else{bear+=2;signals.push('MACD 음전환 🔴');}
  }
  if(bollPct!=null){
    if(bollPct<20){bull+=1;signals.push('볼린저 하단 반등구간 🟢');}
    else if(bollPct>80){bear+=1;signals.push('볼린저 상단 과매수 🔴');}
    else signals.push('볼린저 중심권 ⚪');
  }
  const total=bull+bear||1;
  const score=Math.round((bull/total)*100);
  let type,title;
  if(score>=65){type='bull';title='📈 상승 가능성 높음';}
  else if(score<=35){type='bear';title='📉 하락 주의';}
  else{type='neutral';title='➡️ 방향성 불확실';}
  return{type,title,desc:signals.join(' · '),score};
}

async function run(){
  const raw=$('ticker').value.trim();
  const out=$('out');
  if(!raw){out.innerHTML='<div class="msg err">종목명을 입력하세요</div>';return;}
  const stock=resolve(raw);
  if(!stock){out.innerHTML=`<div class="msg err">⚠️ "${raw}" 없음</div>`;return;}
  sym=stock.t;
  // 키 로테이션 유지
  $('go').disabled=true;$('go').innerHTML='<span class="spin"></span>';

  try{
    setProgress(15,'현재가 조회 중... (1/5)');
    const qd=await avGet('GLOBAL_QUOTE');
    const q=qd['Global Quote'];
    if(!q||!q['05. price']){
      if(qd.Note||qd.Information) throw new Error('잠시 후 다시 시도하세요 (한도 초과)');
      throw new Error('종목을 찾을 수 없습니다');
    }
    const price=parseFloat(q['05. price']);
    const chg=parseFloat(q['09. change']);
    const chgp=parseFloat(q['10. change percent']);
    const hi=parseFloat(q['03. high']);
    const lo=parseFloat(q['04. low']);
    const prev=parseFloat(q['08. previous close']);
    const pivot=(hi+lo+prev)/3;
    const r1=2*pivot-lo,s1=2*pivot-hi;

    await delay(400);setProgress(35,'RSI 계산 중... (2/5)');
    let rsi=null;
    try{const d=await avGet('RSI','&interval=daily&time_period=14&series_type=close');
      const o=d['Technical Analysis: RSI'];if(o){const k=Object.keys(o)[0];rsi=parseFloat(o[k]['RSI']);}}catch(e){}

    await delay(400);setProgress(55,'MACD 계산 중... (3/5)');
    let macdHist=null;
    try{const d=await avGet('MACD','&interval=daily&series_type=close');
      const o=d['Technical Analysis: MACD'];if(o){const k=Object.keys(o)[0];macdHist=parseFloat(o[k]['MACD_Hist']);}}catch(e){}

    await delay(400);setProgress(75,'볼린저 계산 중... (4/5)');
    let bollPct=null,bollPos=null;
    try{const d=await avGet('BBANDS','&interval=daily&time_period=20&series_type=close');
      const o=d['Technical Analysis: BBANDS'];if(o){const k=Object.keys(o)[0];
        const up=parseFloat(o[k]['Real Upper Band']),lo2=parseFloat(o[k]['Real Lower Band']);
        bollPct=((price-lo2)/(up-lo2))*100;
        bollPos=bollPct>85?'상단돌파':bollPct>65?'상단근접':bollPct<15?'하단돌파':bollPct<35?'하단근접':'중심부근';}}catch(e){}

    await delay(400);setProgress(95,'뉴스 조회 중... (5/5)');
    let news=[];
    try{const d=await avGet('NEWS_SENTIMENT','&limit=3');
      if(d.feed) news=d.feed.slice(0,3).map(n=>({title:n.title,source:n.source,sentiment:n.overall_sentiment_label}));}catch(e){}

    setProgress(100,'완료!');await delay(300);

    const atr=price*0.02;
    const dB=price,dT1=price+atr*1.5,dT2=price+atr*2.5,dSL=price-atr*1.2;
    const sB=price*0.995,sT1=price+atr*3,sT2=price+atr*5,sSL=price-atr*2;
    const pt=(b,t)=>{const p=(t-b)/b*100;return `<span class="pct ${p>=0?'up':'down'}">${p>=0?'+':''}${fmt(p,1)}%</span>`;};

    const outlook=analyzeOutlook(rsi,macdHist,bollPct);
    const sc=outlook.score>=65?'var(--green)':outlook.score<=35?'var(--red)':'var(--gold)';
    const newsHtml=news.length?news.map(n=>`
      <div class="news-item"><div class="nt">${n.title}</div><div class="ns">${n.source} · ${n.sentiment||''}</div></div>`).join(''):'<div class="news-item"><div class="nt" style="color:var(--dim)">뉴스 없음</div></div>';

    out.innerHTML=`
      <div class="card price-card">
        <div class="ticker-name">${stock.n} 🇺🇸</div>
        <div class="ticker-row"><div class="ticker">${stock.t}</div><div class="live"><span class="dot"></span>LIVE</div></div>
        <div class="price">$${fmt(price)}</div>
        <div class="change ${chg>=0?'up':'down'}">${chg>=0?'▲':'▼'} ${fmt(Math.abs(chg))} (${chg>=0?'+':''}${fmt(chgp,2)}%)</div>
      </div>
      <div class="card score-card">
        <div class="score-label">종합 매수 강도</div>
        <div class="score-num" style="color:${sc}">${outlook.score}</div>
        <div class="score-bar"><div class="score-fill" style="width:${outlook.score}%;background:${sc}"></div></div>
        <div class="score-desc" style="color:${sc}">${outlook.title}</div>
      </div>
      <div class="outlook ${outlook.type}">
        <div class="outlook-title">${outlook.title}</div>
        <div class="outlook-desc">${outlook.desc}</div>
      </div>
      <div class="card ind-grid">
        <div class="ind"><div class="lbl">RSI (14)</div><div class="val">${rsi!=null?fmt(rsi,1):'—'}</div><div class="sub">${rsi!=null?(rsi>70?'🔴 과매수':rsi<30?'🟢 과매도':'중립'):'—'}</div></div>
        <div class="ind"><div class="lbl">MACD</div><div class="val" style="font-size:14px">${macdHist!=null?(macdHist>=0?'+':'')+fmt(macdHist,3):'—'}</div><div class="sub">${macdHist!=null?(macdHist>=0?'🟢 매수':'🔴 매도'):'—'}</div></div>
        <div class="ind"><div class="lbl">볼린저</div><div class="val" style="font-size:13px">${bollPos||'—'}</div><div class="sub">${bollPct!=null?'밴드 '+fmt(bollPct,0)+'%':''}</div></div>
        <div class="ind"><div class="lbl">고가 / 저가</div><div class="val" style="font-size:13px">$${fmt(hi)}</div><div class="sub">저가 $${fmt(lo)}</div></div>
      </div>
      <div class="card lvl-card">
        <div class="lvl sup"><div class="lbl">지지 S1</div><div class="val">$${fmt(s1)}</div></div>
        <div class="lvl"><div class="lbl">피봇</div><div class="val" style="color:var(--accent)">$${fmt(pivot)}</div></div>
        <div class="lvl res"><div class="lbl">저항 R1</div><div class="val">$${fmt(r1)}</div></div>
      </div>
      <div class="card plan-card">
        <div class="plan-tab day">🔥 단타 (오늘)</div>
        <div class="plan-body">
          <div class="prow"><span class="k">매수</span><span class="v">$${fmt(dB)}</span></div>
          <div class="prow"><span class="k">1차 목표</span><span class="v">$${fmt(dT1)}${pt(dB,dT1)}</span></div>
          <div class="prow"><span class="k">2차 목표</span><span class="v">$${fmt(dT2)}${pt(dB,dT2)}</span></div>
          <div class="prow"><span class="k">손절</span><span class="v">$${fmt(dSL)}${pt(dB,dSL)}</span></div>
        </div>
      </div>
      <div class="card plan-card">
        <div class="plan-tab swing">📈 스윙 (3~5일)</div>
        <div class="plan-body">
          <div class="prow"><span class="k">매수</span><span class="v">$${fmt(sB)}</span></div>
          <div class="prow"><span class="k">1차 목표</span><span class="v">$${fmt(sT1)}${pt(sB,sT1)}</span></div>
          <div class="prow"><span class="k">2차 목표</span><span class="v">$${fmt(sT2)}${pt(sB,sT2)}</span></div>
          <div class="prow"><span class="k">손절</span><span class="v">$${fmt(sSL)}${pt(sB,sSL)}</span></div>
        </div>
      </div>
      <div class="card news-card">
        <div class="news-title">📰 최신 뉴스</div>
        ${newsHtml}
      </div>`;
  }catch(err){
    out.innerHTML=`<div class="msg err">⚠️ ${err.message}</div>`;
  }finally{
    $('go').disabled=false;$('go').textContent='분석';
  }
}
</script>
</body>
</html>
